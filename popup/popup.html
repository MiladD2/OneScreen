<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      width: 300px;
      padding: 20px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      color: #e5e5e5;
      background-color: #141414;
    }
    h2 {
      margin-top: 0;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fafafa;
      letter-spacing: -0.02em;
    }
    button {
      width: 100%;
      padding: 11px 16px;
      margin-bottom: 8px;
      border: none;
      border-radius: 8px;
      background-color: #2563eb;
      color: white;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    button:hover {
      background-color: #1d4ed8;
      box-shadow: 0 0 20px rgba(37, 99, 235, 0.25);
    }
    button:disabled {
      background-color: #262626;
      color: #525252;
      cursor: not-allowed;
      box-shadow: none;
    }
    #status {
      font-size: 0.85rem;
      color: #737373;
      margin-bottom: 14px;
      text-align: center;
    }
    .hidden {
      display: none;
    }
    #progress-container {
      width: 100%;
      background-color: #262626;
      border-radius: 10px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    #progress-bar {
      width: 0%;
      height: 8px;
      background-color: #2563eb;
      border-radius: 10px;
      transition: width 0.2s;
    }
  </style>
</head>
<body>
  <h2>OneScreen</h2>
  
  <button id="capture-btn">Capture Full Page</button>
  <div id="progress-container" class="hidden">
    <div id="progress-bar"></div>
  </div>
  <div id="status">Ready to capture</div>

  <script src="popup.js"></script>
</body>
</html>
